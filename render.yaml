services:
  - type: web
    name: inventory-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run db:setup && npm run db:populate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: NODE_VERSION
        value: 20

databases:
  - name: inventory-db
    plan: free
